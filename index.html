<!DOCTYPE html>
<html>
<head>
    <title>Cafe Order</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <h2 id="tableDisplay">Loading...</h2>
    <button onclick="orderLatte()" style="padding: 20px; font-size: 20px;">Order Latte</button>

    <script>
        const firebaseConfig = { /* YOUR CONFIG FROM FIREBASE CONSOLE */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const table = urlParams.get('table') || "Unknown";
        document.getElementById("tableDisplay").innerText = "Table: " + table;

        function orderLatte() {
            db.collection("orders").add({
                item: "Latte",
                table: table,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("Latte ordered for table " + table));
        }
    </script>
</body>
</html>
